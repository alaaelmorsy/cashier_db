<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>الفواتير الدائنة</title>
    <link rel="stylesheet" href="../tailwind-output.css">
    <link rel="stylesheet" href="../vendor/sweetalert2/sweetalert2.min.css">
    <style>
      @font-face {
        font-family: 'Cairo';
        src: url('../../../assets/fonts/Cairo-Regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: 'Cairo';
        src: url('../../../assets/fonts/Cairo-Medium.ttf') format('truetype');
        font-weight: 500;
        font-style: normal;
      }
      @font-face {
        font-family: 'Cairo';
        src: url('../../../assets/fonts/Cairo-SemiBold.ttf') format('truetype');
        font-weight: 600;
        font-style: normal;
      }
      @font-face {
        font-family: 'Cairo';
        src: url('../../../assets/fonts/Cairo-Bold.ttf') format('truetype');
        font-weight: 700;
        font-style: normal;
      }
      * {
        font-family: 'Cairo', system-ui, -apple-system, sans-serif;
      }
      .swal2-popup { border-radius: 18px; }
      .swal2-title { color: #1e3a5f; font-size: 1.35rem; }
      .swal2-confirm { min-width: 110px; border-radius: 10px !important; }
      .zatca-response-text {
        direction: ltr;
        max-height: 55vh;
        overflow: auto;
        white-space: pre-wrap;
        text-align: left;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace !important;
        font-size: 12px !important;
        line-height: 1.7;
      }
    </style>
  </head>
  <body class="bg-gray-50">
    <header class="sticky top-0 z-10 flex items-center justify-between px-6 py-4 bg-white border-b border-gray-200">
      <div class="text-xl font-semibold text-gray-800">📄 الفواتير الدائنة</div>
      <nav>
        <button id="btnBack" class="px-5 py-2.5 bg-slate-600 text-white rounded-lg font-medium">
          ⬅ الرئيسية
        </button>
      </nav>
    </header>

    <div class="max-w-7xl mx-auto my-6 px-4">
      <div class="bg-white border border-gray-200 rounded-lg p-5 mb-5">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-3 items-end">
          <input id="q" placeholder="بحث برقم الإشعار/الفاتورة أو العميل" class="md:col-span-3 px-4 py-2.5 border border-gray-300 rounded-lg" />
          <input id="q2" placeholder="بحث بالهاتف/الضريبي/اسم العميل" class="md:col-span-3 px-4 py-2.5 border border-gray-300 rounded-lg" />
          <div class="md:col-span-2">
            <label class="block text-xs font-semibold text-gray-600 mb-1">من:</label>
            <input id="dateFrom" type="datetime-local" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" />
          </div>
          <div class="md:col-span-2">
            <label class="block text-xs font-semibold text-gray-600 mb-1">إلى:</label>
            <input id="dateTo" type="datetime-local" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" />
          </div>
          <button id="applyBtn" class="md:col-span-2 px-5 py-2.5 bg-blue-600 text-white rounded-lg font-medium">
            عرض
          </button>
        </div>
      </div>

      <div class="flex justify-between items-center my-3 flex-wrap gap-3">
        <div class="flex gap-2 items-center">
          <span class="text-gray-600 font-medium">عدد الصفوف في الصفحة:</span>
          <select id="pageSize" class="px-3 py-2 border border-gray-300 rounded-lg">
            <option value="20" selected>20</option>
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="0">الكل</option>
          </select>
        </div>
        <div id="pagerTop" class="flex gap-2 items-center"></div>
      </div>

      <div class="overflow-hidden rounded-lg border border-gray-200">
        <table class="w-full bg-white">
          <thead>
            <tr class="bg-blue-50">
              <th class="px-4 py-3 text-right text-sm font-bold text-blue-900 border-b border-gray-200">#</th>
              <th class="px-4 py-3 text-right text-sm font-bold text-blue-900 border-b border-gray-200">رقم الإشعار</th>
              <th class="px-4 py-3 text-right text-sm font-bold text-blue-900 border-b border-gray-200">رقم الفاتورة الأساسية</th>
              <th class="px-4 py-3 text-right text-sm font-bold text-blue-900 border-b border-gray-200">العميل</th>
              <th class="px-4 py-3 text-right text-sm font-bold text-blue-900 border-b border-gray-200">الهاتف</th>
              <th class="px-4 py-3 text-right text-sm font-bold text-blue-900 border-b border-gray-200">الإجمالي</th>
              <th class="px-4 py-3 text-right text-sm font-bold text-blue-900 border-b border-gray-200">التاريخ</th>
              <th class="px-4 py-3 text-center text-sm font-bold text-blue-900 border-b border-gray-200">إجراءات</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div id="pagerBottom" class="flex gap-2 items-center justify-center mt-4"></div>
    </div>

    <script src="../appointment-notifications.js"></script>

    <script src="../theme.js"></script>
    <script src="../vendor/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
