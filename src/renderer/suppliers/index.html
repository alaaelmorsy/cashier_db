<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>الموردون - POS SA</title>
    <link rel="stylesheet" href="../tailwind-output.css">
    <style>
      @font-face {
        font-family: 'Cairo';
        src: url('../../../assets/fonts/Cairo-Regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: 'Cairo';
        src: url('../../../assets/fonts/Cairo-Medium.ttf') format('truetype');
        font-weight: 500;
        font-style: normal;
      }
      @font-face {
        font-family: 'Cairo';
        src: url('../../../assets/fonts/Cairo-SemiBold.ttf') format('truetype');
        font-weight: 600;
        font-style: normal;
      }
      @font-face {
        font-family: 'Cairo';
        src: url('../../../assets/fonts/Cairo-Bold.ttf') format('truetype');
        font-weight: 700;
        font-style: normal;
      }
      * {
        font-family: 'Cairo', system-ui, -apple-system, sans-serif;
      }
      .error:empty { display:none; }
      dialog {
        border: none;
        border-radius: 16px;
        padding: 0;
        width: min(95vw, 700px);
        background: #fff;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) !important;
        margin: 0 !important;
        max-height: 90vh;
        overflow-y: auto;
      }
      #confirmDlg {
        max-width: 420px;
        width: min(95vw, 420px);
      }
      .toast {
        position: fixed;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        padding: 16px 24px;
        border-radius: 12px;
        color: #fff;
        font-weight: 600;
        font-size: 15px;
        z-index: 9999;
        min-width: 300px;
        max-width: 600px;
        text-align: center;
        display: none;
      }
      .toast.show { display: block; }
    </style>
  </head>
  <body class="bg-gray-50">
    <header class="sticky top-0 z-10 flex items-center justify-between px-6 py-4 bg-white border-b border-gray-200">
      <div class="text-xl font-semibold text-gray-800">🏪 إدارة الموردين</div>
      <nav>
        <button onclick="window.location.href='../main/index.html'" class="px-5 py-2.5 bg-slate-600 text-white rounded-lg font-medium">
          ⬅ العودة
        </button>
      </nav>
    </header>

    <div class="max-w-7xl mx-auto my-6 px-4">
      <div class="flex flex-wrap gap-3 mb-4 items-center justify-between">
        <input id="q" placeholder="🔍 البحث بالاسم أو رقم الجوال أو الرقم الضريبي..." class="flex-1 min-w-[250px] px-4 py-3 border border-gray-300 rounded-lg" />
        <div class="flex gap-2 flex-wrap">
          <button id="addBtn" class="px-5 py-2.5 bg-blue-600 text-white rounded-lg font-medium">
            ➕ إضافة مورد
          </button>
          <button id="refreshBtn" class="px-5 py-2.5 bg-slate-600 text-white rounded-lg font-medium">
            🔄 تحديث
          </button>
        </div>
      </div>

      <div id="error" class="error text-red-700 bg-red-50 border border-red-200 px-4 py-2.5 rounded-lg min-h-[22px] my-2 text-center font-medium"></div>

      <div class="flex justify-between items-center my-3 flex-wrap gap-3">
        <div class="flex gap-2 items-center">
          <span class="text-gray-600 font-medium">عدد الصفوف في الصفحة:</span>
          <select id="pageSize" class="px-3 py-2 border border-gray-300 rounded-lg">
            <option value="20">20</option>
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="0">الكل</option>
          </select>
        </div>
        <div id="pagerTop" class="flex gap-2 items-center"></div>
      </div>

      <div class="overflow-hidden rounded-lg border border-gray-200">
        <table class="w-full bg-white">
          <thead>
            <tr class="bg-blue-50">
              <th class="px-4 py-3 text-right text-sm font-bold text-blue-900 border-b border-gray-200">#</th>
              <th class="px-4 py-3 text-right text-sm font-bold text-blue-900 border-b border-gray-200">اسم المورد</th>
              <th class="px-4 py-3 text-right text-sm font-bold text-blue-900 border-b border-gray-200">رقم الجوال</th>
              <th class="px-4 py-3 text-right text-sm font-bold text-blue-900 border-b border-gray-200">الرقم الضريبي</th>
              <th class="px-4 py-3 text-right text-sm font-bold text-blue-900 border-b border-gray-200">الحالة</th>
              <th class="px-4 py-3 text-right text-sm font-bold text-blue-900 border-b border-gray-200">الرصيد المستحق</th>
              <th class="px-4 py-3 text-center text-sm font-bold text-blue-900 border-b border-gray-200">العمليات</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div id="pagerBottom" class="flex gap-2 items-center justify-center mt-4"></div>

      <div class="flex justify-end mt-4">
        <div id="totalDueCard" class="inline-flex items-center gap-3 rounded-xl border-2 border-blue-200 bg-gradient-to-l from-blue-50 to-white px-4 py-2.5 shadow-sm">
          <div class="flex items-center gap-1.5 text-xs font-semibold text-blue-600">
            <span>💰</span>
            <span>إجمالي المستحق</span>
          </div>
          <div id="totalDueValue" class="text-lg font-bold text-blue-700 tabular-nums">0.00</div>
        </div>
      </div>
    </div>

    <dialog id="dlg">
      <div class="px-5 py-4 bg-blue-600 text-white text-lg font-bold rounded-t-lg">
        <span id="dlgTitle">➕ إضافة مورد جديد</span>
      </div>
      <div class="p-6 space-y-5">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">اسم المورد <span class="text-red-600">*</span></label>
          <input id="f_name" placeholder="أدخل اسم المورد..." class="w-full px-4 py-2.5 border border-gray-300 rounded-lg" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">رقم الجوال</label>
          <input id="f_phone" placeholder="مثال: 0501234567" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">الرقم الضريبي</label>
          <input id="f_vat" placeholder="15 رقماً" maxlength="15" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg" />
        </div>
        <div class="flex gap-3 justify-end pt-2">
          <button id="dlgCancel" class="px-5 py-2.5 bg-gray-500 text-white rounded-lg font-medium">إلغاء</button>
          <button id="dlgSave" class="px-5 py-2.5 bg-blue-600 text-white rounded-lg font-medium">✓ حفظ</button>
        </div>
      </div>
    </dialog>

    <dialog id="payDlg">
      <div class="px-5 py-4 bg-blue-600 text-white text-lg font-bold rounded-t-lg">
        💳 سداد فاتورة شراء
      </div>
      <div class="p-6 space-y-5">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">اختر فاتورة الشراء الآجلة</label>
          <select id="pay_invoice_select" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg"></select>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">رقم الفاتورة</label>
          <input id="pay_invoice_no" readonly class="w-full px-4 py-2.5 border border-gray-300 rounded-lg bg-gray-50" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">المبلغ المتبقي</label>
          <input id="pay_due_view" readonly class="w-full px-4 py-2.5 border border-gray-300 rounded-lg bg-gray-50" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">المبلغ</label>
          <input id="pay_amount" type="number" min="0" step="0.01" placeholder="0.00" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">ملاحظة (اختياري)</label>
          <input id="pay_note" placeholder="ملاحظة..." class="w-full px-4 py-2.5 border border-gray-300 rounded-lg" />
        </div>
        <div class="flex gap-3 justify-end pt-2">
          <button id="payCancel" class="px-5 py-2.5 bg-gray-500 text-white rounded-lg font-medium">إلغاء</button>
          <button id="paySave" class="px-5 py-2.5 bg-blue-600 text-white rounded-lg font-medium">✅ سداد</button>
        </div>
      </div>
    </dialog>

    <dialog id="confirmDlg">
      <div id="confirmHeader" class="px-5 py-4 bg-red-600 text-white text-lg font-bold rounded-t-lg flex items-center gap-2">
        <span id="confirmHeaderIcon">⚠️</span>
        <span id="confirmTitle">تأكيد حذف المورد</span>
      </div>
      <div class="p-6 space-y-4">
        <div class="flex gap-3">
          <div class="text-3xl" id="confirmIcon">❓</div>
          <div class="text-gray-800 text-base leading-relaxed" id="confirmText"></div>
        </div>
        <div class="flex gap-3 justify-end pt-2">
          <button id="confirmCancel" class="px-5 py-2.5 bg-gray-500 text-white rounded-lg font-medium">إلغاء</button>
          <button id="confirmOk" class="px-5 py-2.5 bg-slate-600 text-white rounded-lg font-medium">موافق</button>
        </div>
      </div>
    </dialog>

    <div id="toast" class="toast"></div>
    <script src="../appointment-notifications.js"></script>

    <script src="../theme.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
