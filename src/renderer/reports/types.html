<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>تقرير الأنواع</title>
    <link rel="stylesheet" href="../tailwind-output.css">
    <style>
      :root{ --bg:#f6f8fb; --card:#ffffff; --border:#e6eaf0; --text:#0f172a; --muted:#64748b; --brand:#0b3daa; }
      *{box-sizing:border-box}
      html,body{height:100%}
      body{font-family: 'Cairo', system-ui, -apple-system, Segoe UI, Roboto, "Noto Kufi Arabic", Arial, sans-serif; font-weight:700; background:var(--bg); margin:0; color:var(--text)}
      header{position:sticky; top:0; z-index:10; display:flex; gap:12px; align-items:center; justify-content:space-between; background:var(--card); padding:12px 16px; border-bottom:1px solid var(--border)}
      .title{font-weight:700}
      .toolbar{display:flex; gap:8px}
      
      @media screen{
        .btn{padding:10px 16px; border:none; background:#3b82f6; color:#fff; border-radius:8px; cursor:pointer; font-weight:700; transition:background 0.2s}
        .btn:hover{background:#2563eb}
        .btn:active{background:#1d4ed8}
        #btnBack{background:#ef4444; color:#fff}
        #btnBack:hover{background:#dc2626}
        #btnBack:active{background:#b91c1c}
        #loadBtn{background:#3b82f6; color:#fff}
        #loadBtn:hover{background:#2563eb}
        #loadBtn:active{background:#1d4ed8}
        #exportPdfBtn{background:#8b5cf6; color:#fff}
        #exportPdfBtn:hover{background:#7c3aed}
        #exportPdfBtn:active{background:#6d28d9}
        #exportExcelBtn{background:#10b981; color:#fff}
        #exportExcelBtn:hover{background:#059669}
        #exportExcelBtn:active{background:#047857}
      }
      .container{max-width:1100px; margin:16px auto; padding:0 12px}
      .muted{color:var(--muted)}
      
      @media screen{
        .input{padding:10px 12px; border:2px solid #cbd5e1; background:#fff; border-radius:8px; font-weight:700; transition:border-color 0.2s}
        .input:focus{outline:none; border-color:#3b82f6}
        label{font-weight:700; color:var(--text)}
      }
      
      .section{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px; margin:12px 0}
      .section h3{margin:0 0 8px; font-size:16px}
      
      @media screen{
        #catDetails h4{
          background:#3b82f6;
          color:#fff;
          padding:12px 16px;
          margin:16px 0 12px 0;
          border-radius:8px;
          font-size:16px;
          font-weight:700;
          text-align:center;
        }
        #catDetails h4:first-child{margin-top:0}
      }
      
      table{width:100%; border-collapse:collapse}
      th,td{padding:10px; border-bottom:1px solid var(--border); text-align:right}
      th{background:#eef2ff; color:var(--brand); font-weight:600}
      .right{text-align:left}
      details > summary{list-style:none; cursor:pointer; color:var(--muted); margin:-4px 0 8px; position:relative; padding-right:16px}
      details > summary::-webkit-details-marker{display:none}
      details > summary::before{content:'▸'; position:absolute; right:0; top:0; color:var(--muted); transform:translateY(2px); transition:transform .2s}
      details[open] > summary::before{transform:rotate(90deg) translateX(2px)}
      @font-face{
        font-family: 'Cairo';
        src: url('../../../assets/fonts/Cairo-Regular.ttf') format('truetype');
        font-weight: 400;
        font-display: swap;
      }
      @font-face{
        font-family: 'Cairo';
        src: url('../../../assets/fonts/Cairo-Medium.ttf') format('truetype');
        font-weight: 500;
        font-display: swap;
      }
      @font-face{
        font-family: 'Cairo';
        src: url('../../../assets/fonts/Cairo-SemiBold.ttf') format('truetype');
        font-weight: 600;
        font-display: swap;
      }
      @font-face{
        font-family: 'Cairo';
        src: url('../../../assets/fonts/Cairo-Bold.ttf') format('truetype');
        font-weight: 700;
        font-display: swap;
      }
      @font-face{
        font-family: 'saudi_riyal';
        src: url('../../../assets/fonts/saudi-riyal.woff') format('woff'),
             url('../../../assets/fonts/saudi-riyal.ttf') format('truetype');
        font-display: swap;
        unicode-range: U+E900;
      }
      :root{ --m-left: 0mm; --m-right: 0mm; }
      @media print{
        @page{ margin-left: 8mm; margin-right: 8mm; }
        body{ padding-left: var(--m-left); padding-right: var(--m-right); }
        *, *::before, *::after{
          font-family: 'saudi_riyal', system-ui, -apple-system, Segoe UI, Roboto, "Noto Kufi Arabic", Arial, sans-serif !important;
          font-weight: 800 !important;
          color: #0f172a !important;
          font-size: 14px !important;
        }
      }
      
      /* Dark Mode Support */
      @media screen {
        body.dark {
          --bg: #0d0d0d;
          --card: #1a1a1a;
          --border: #333333;
          --text: #ffffff;
          --muted: #9ca3af;
          --brand: #3b82f6;
          background: var(--bg);
          color: var(--text);
        }
        body.dark header { background: var(--card); border-bottom-color: var(--border); }
        body.dark .section { background: var(--card); border-color: var(--border); }
        body.dark .kpi { background: var(--card); border-color: var(--border); }
        body.dark .kpi .value { color: var(--brand); }
        body.dark .kpi .label { color: var(--muted); }
        body.dark th { background: #1a2744; color: #93c5fd; }
        body.dark td { color: var(--text); border-bottom-color: var(--border); }
        body.dark table { border-color: var(--border); }
        body.dark .summary-item { background: var(--card); border-color: var(--border); color: var(--text); }
        body.dark .input { background: #1a1a1a; border-color: var(--border); color: var(--text); }
        body.dark .input:focus { border-color: #3b82f6; }
        body.dark label { color: var(--text); }
        body.dark #productSuggestions { background: #1a1a1a; border-color: #3b82f6; }
        body.dark #productSuggestions div { color: var(--text); border-bottom-color: var(--border); }
        body.dark #productSuggestions div:hover { background: #1a2744 !important; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="title">تقرير الأنواع</div>
      <div class="toolbar">
        <button id="btnBack" class="btn">الرجوع</button>
      </div>
    </header>
    <div class="container">
      <div class="section">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:8px; margin:8px 0; flex-wrap:nowrap;">
          <div style="display:flex; gap:6px; align-items:center; flex:1; min-width:0;">
            <div style="position:relative;display:flex;align-items:center;gap:4px;flex:1;min-width:0;">
              <label for="productSearch" style="white-space:nowrap;font-size:13px;">بحث صنف:</label>
              <input id="productSearch" class="input" type="text" placeholder="اسم أو باركود..." autocomplete="off" style="padding:6px 8px;font-size:12px;min-width:0;flex:1;padding-left:22px;" />
              <span id="productClearBtn" style="cursor:pointer;color:#94a3b8;font-size:14px;display:none;position:absolute;left:4px;" title="مسح">✕</span>
              <div id="productSuggestions" style="display:none;position:absolute;top:100%;right:0;min-width:260px;background:#fff;border:1.5px solid #3b82f6;border-radius:8px;z-index:100;max-height:220px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,0.12);"></div>
            </div>
            <label for="fromAt" style="white-space:nowrap;font-size:13px;">من:</label>
            <input id="fromAt" class="input" type="datetime-local" style="padding:6px 8px;font-size:12px;min-width:0;flex:1;" />
            <label for="toAt" style="white-space:nowrap;font-size:13px;">إلى:</label>
            <input id="toAt" class="input" type="datetime-local" style="padding:6px 8px;font-size:12px;min-width:0;flex:1;" />
            <button id="loadBtn" class="btn" style="padding:6px 12px;font-size:13px;white-space:nowrap;">تطبيق</button>
          </div>
          <div style="display:flex; gap:6px; flex-shrink:0;">
            <button id="exportPdfBtn" class="btn" style="padding:6px 10px;font-size:13px;white-space:nowrap;">تصدير PDF</button>
            <button id="exportExcelBtn" class="btn" style="padding:6px 10px;font-size:13px;white-space:nowrap;">تصدير Excel</button>
          </div>
        </div>
        <div class="muted" id="range" style="margin-top:6px"></div>
      </div>

      <!-- تفاصيل الأصناف لكل تصنيف (يبقى في الوسط) -->
      <div class="section">
        <details>
          <summary>تفصيل الأصناف لكل تصنيف</summary>
          <div id="catDetails"></div>
        </details>
      </div>

      <!-- نقل قسم الإجماليات (تجميع حسب التصنيفات) إلى أسفل التقرير -->
      <div class="section">
        <h3>تجميع حسب التصنيفات</h3>
        <div style="overflow:auto">
          <table>
            <thead>
              <tr>
                <th>التصنيف</th>
                <th>عدد الأصناف المباعة</th>
                <th>إجمالي الكمية</th>
                <th class="right">إجمالي المبيعات</th>
              </tr>
            </thead>
            <tbody id="catTbody"></tbody>
          </table>
        </div>
      </div>

      <!-- تمت إزالة قسم تفاصيل أصناف التبغ بالكامل حسب الطلب -->
    </div>
    <script>
      // إخفاء زر العودة إذا كان هناك زر الرجوع
      window.addEventListener('DOMContentLoaded', function() {
        const btnBack = document.getElementById('btnBack');
        if (btnBack) {
          document.querySelectorAll('a, button').forEach(function(el) {
            if (el !== btnBack && el.textContent.includes('العودة')) {
              el.style.display = 'none';
            }
          });
        }
      });
    </script>
    <script src="./print-margins.js"></script>
    <script src="../../shared/report-accounting.js"></script>
    <script src="./types.js"></script>
  </body>
</html>
